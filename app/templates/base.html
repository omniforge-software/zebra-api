<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Zebra API" }}</title>
  <style>
    :root { color-scheme: light; --bg:#f7f7f5; --panel:#fff; --text:#202124; --muted:#666b73; --line:#d9dce0; --accent:#1a73e8; --bad:#b3261e; --ok:#137333; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); }
    header { background:#263238; color:white; padding:14px 22px; display:flex; align-items:center; justify-content:space-between; gap:18px; }
    header a { color:white; text-decoration:none; font-weight:600; }
    nav { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    nav a, nav button { color:white; background:transparent; border:0; font:inherit; text-decoration:none; cursor:pointer; padding:6px 0; }
    main { max-width:1180px; margin:0 auto; padding:24px; }
    h1 { font-size:28px; margin:0 0 18px; letter-spacing:0; }
    h2 { font-size:19px; margin:0 0 12px; letter-spacing:0; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:14px; }
    .panel, .card { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:16px; }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
    table { width:100%; border-collapse:collapse; background:white; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
    th, td { padding:10px 12px; border-bottom:1px solid var(--line); text-align:left; vertical-align:top; font-size:14px; }
    th { background:#eef1f4; font-size:12px; text-transform:uppercase; color:#48505a; letter-spacing:.04em; }
    tr:last-child td { border-bottom:0; }
    input, textarea, select { width:100%; max-width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:6px; font:inherit; background:white; }
    textarea { min-height:180px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    label { display:block; font-size:13px; color:var(--muted); margin:10px 0 5px; }
    button, .button { border:1px solid #174ea6; background:var(--accent); color:white; padding:8px 12px; border-radius:6px; font-weight:650; cursor:pointer; text-decoration:none; display:inline-block; }
    button.secondary, .button.secondary { background:white; color:#174ea6; }
    button.danger { border-color:var(--bad); background:var(--bad); }
    .muted { color:var(--muted); }
    .ok { color:var(--ok); font-weight:700; }
    .bad { color:var(--bad); font-weight:700; }
    .split { display:grid; grid-template-columns: minmax(0, 1fr) minmax(320px, .6fr); gap:16px; align-items:start; }
    code { background:#eef1f4; padding:2px 5px; border-radius:4px; }
    .secret { border:1px solid #f4b400; background:#fff8df; padding:12px; border-radius:8px; word-break:break-all; }
    @media (max-width: 760px) { header { align-items:flex-start; flex-direction:column; } main { padding:16px; } .split { grid-template-columns:1fr; } table { display:block; overflow-x:auto; } }
  </style>
</head>
<body>
  <header>
    <a href="/admin">Zebra API</a>
    <nav>
      <a href="/admin/printers">Printers</a>
      <a href="/admin/templates">Templates</a>
      <a href="/admin/jobs">Jobs</a>
      <a href="/admin/keys">API Keys</a>
      <a href="/admin/settings">Settings</a>
      <form method="post" action="/logout"><button type="submit">Log out</button></form>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
