<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zebra API Login</title>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:system-ui, sans-serif; background:#f7f7f5; color:#202124; }
    form { width:min(380px, calc(100vw - 32px)); background:white; border:1px solid #d9dce0; border-radius:8px; padding:22px; }
    h1 { margin:0 0 18px; font-size:24px; }
    label { display:block; margin:12px 0 5px; color:#666b73; font-size:13px; }
    input { width:100%; padding:10px; border:1px solid #d9dce0; border-radius:6px; font:inherit; }
    button { margin-top:16px; width:100%; border:1px solid #174ea6; background:#1a73e8; color:white; padding:10px; border-radius:6px; font-weight:700; }
    .error { color:#b3261e; margin:0 0 10px; }
  </style>
</head>
<body>
  <form method="post" action="/login">
    <h1>Zebra API</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <label for="username">Username</label>
    <input id="username" name="username" autocomplete="username" required>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Log in</button>
  </form>
</body>
</html>
